<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fontes Externas</title>
    <style>
        @font-face {
            font-family: 'Filxgirl';
            src: url('fonts/Filxgirl.TTF') format(truetype);
            font-weight: normal;
            font-style: normal;
            /*
            Se tiver outro formato de arquivo ficaria assim:display:
            src: url('Filxgirl.TTF') format(truetype), url('Filxgirl.otf') format('opentype');
            Tipos de fomrat()
            - opentype (otf)
            - truetype(ttf)
            - embedded-opentype
            -truetype-att (Apple advanced Typography)
            - svg
            */
        }
        
        body{
            font-family: Arial, Helvetica, sans-serif;
        }

        h1{
            font-family: Filxgirl, Times, serif;
            font-size: 3em;
            font-weight: normal;
        }
    </style>
</head>
<body>
    <h1>Olá, Mundo</h1>
    <p>Lorem ipsum dolor sit amet consectetur, adipisicing elit. Incidunt expedita repellat autem corporis nobis assumenda aperiam quis praesentium accusantium magnam perferendis, rem atque a reiciendis tenetur, tempora delectus. Asperiores, obcaecati.</p>
    
</body>
</html>
