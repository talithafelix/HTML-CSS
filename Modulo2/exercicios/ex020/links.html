<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Links</title>
    <style>

        /* 
            # = id 
            . = class
            : = pseudo-class
            :: = pseudo-element
            > = children
        */

        body{
            font-family: Arial, Helvetica, sans-serif;

        }

        a{
            color:red;
            text-decoration: none;
            font-weight: bold;
        }

        a:visited{
            color:darkred;

        }

        a:hover{
            color:black;
            text-decoration: underline;
        }

        a:active{
            color:yellow;
        }

        /* a::before{
            content:'-->';
        }


        a::after{
            content: ' [link]';
            text-decoration: none;
            font-weight: normal;
            color: darkgrey;
        } */

        .especial{
            background-color: darkred;
        
        }

        .especial::before{
            content:'->';
        }

        .especial::after{
            content:'<-';
        }

    </style>
</head>
<body>
    <h1>Personalizando Links</h1>
    <ul>
        <li><a href="https://www.youtube.com/watch?v=vMlrcOVr7po&list=PLHz_AreHm4dlUpEXkY1AyVLQGcpSgVF8s&index=22" target="_blank">Repositório Github</a></li>
        <li><a href="https://color.adobe.com/create/color-wheel" target="_blank" class="especial">Canal do Youtube</a></li>
        <li><a href="https://anthropic.skilljar.com/" target="_blank">Site do CursoemVideo</a></li>
    </ul>
</body>
</html>
